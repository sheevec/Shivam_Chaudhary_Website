<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shivam Chaudhary</title>
  <script>
    // GitHub Pages SPA redirect — preserves hash/path for React router
    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;
    const redirectTo = '/?redirect=' + encodeURIComponent(path + search) + hash;
    window.location.replace(redirectTo);
  </script>
</head>
<body></body>
</html>
